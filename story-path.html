<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Path</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

    body{
      background:
        radial-gradient(circle at top right,rgba(0,180,255,.35),transparent 35%),
        radial-gradient(circle at top left,rgba(80,80,255,.24),transparent 32%),
        linear-gradient(180deg,#00152c,#001020,#000713);
      color:white;
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
    }

    .container{
      max-width:480px;
      margin:auto;
      padding:20px 16px 120px;
    }

    .back-btn{
      background:rgba(255,255,255,.11);
      border:1px solid rgba(120,210,255,.2);
      color:white;
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      margin-bottom:18px;
    }

    .title{text-align:center;margin-bottom:16px}
    .title h1{font-size:34px;margin-bottom:8px}
    .title p{font-size:14px;color:#d9efff;line-height:1.5}

    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:16px;
    }

    .stat{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(120,210,255,.18);
      border-radius:16px;
      padding:12px 6px;
      text-align:center;
    }

    .stat h2{font-size:20px}
    .stat span{font-size:10px;color:#d9efff}

    .story-card{
      background:
        radial-gradient(circle at top right,rgba(0,180,255,.24),transparent 42%),
        rgba(255,255,255,.08);
      border:1px solid rgba(120,210,255,.2);
      border-radius:28px;
      padding:20px;
      box-shadow:0 18px 40px rgba(0,120,255,.2);
      margin-bottom:16px;
      position:relative;
      overflow:hidden;
    }

    .story-card::after{
      content:"✦";
      position:absolute;
      right:18px;
      top:14px;
      color:rgba(255,255,255,.25);
      font-size:26px;
    }

    .chapter-label{
      font-size:13px;
      color:#bfe7ff;
      margin-bottom:8px;
    }

    .scene-title{
      font-size:24px;
      font-weight:bold;
      margin-bottom:12px;
      line-height:1.25;
    }

    .scene-text{
      color:#d9efff;
      font-size:14px;
      line-height:1.65;
      margin-bottom:18px;
    }

    .vision-meter{
      background:rgba(255,255,255,.1);
      border:1px solid rgba(120,210,255,.16);
      border-radius:18px;
      padding:13px;
      margin-bottom:16px;
    }

    .meter-row{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      color:#d9efff;
      margin-bottom:8px;
    }

    .meter-bar{
      height:9px;
      background:rgba(255,255,255,.14);
      border-radius:999px;
      overflow:hidden;
    }

    .meter-fill{
      height:100%;
      width:50%;
      background:linear-gradient(90deg,#7bdcff,#0077ff);
      border-radius:999px;
      transition:.35s;
      box-shadow:0 0 15px rgba(0,180,255,.65);
    }

    .choices{
      display:grid;
      gap:12px;
    }

    .choice-btn{
      border:none;
      border-radius:18px;
      background:rgba(255,255,255,.1);
      color:white;
      border:1px solid rgba(120,210,255,.2);
      padding:15px;
      text-align:left;
      line-height:1.45;
      font-size:14px;
    }

    .choice-btn strong{
      display:block;
      margin-bottom:5px;
      font-size:15px;
    }

    .choice-btn:active{transform:scale(.97)}

    .choice-btn:hover{
      background:rgba(255,255,255,.15);
    }

    .log-box{
      margin-top:16px;
      background:rgba(255,255,255,.07);
      border:1px solid rgba(120,210,255,.16);
      border-radius:22px;
      padding:14px;
      color:#d9efff;
      font-size:13px;
      line-height:1.5;
      display:none;
    }

    .log-box strong{color:white}

    .info{
      margin-top:14px;
      text-align:center;
      color:#d9efff;
      font-size:13px;
      line-height:1.5;
      min-height:40px;
    }

    .game-over{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.84);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:99;
    }

    .popup{
      width:100%;
      max-width:380px;
      background:#00152c;
      border-radius:28px;
      padding:28px 22px;
      text-align:center;
      border:1px solid rgba(120,210,255,.25);
      box-shadow:0 0 34px rgba(0,180,255,.28);
    }

    .popup h2{font-size:30px;margin-bottom:12px}
    .popup p{color:#d9efff;line-height:1.6;margin-bottom:22px}

    .restart{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      background:white;
      color:#0057a8;
      font-size:16px;
      font-weight:bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <button class="back-btn" onclick="history.back()">← Kembali</button>

    <div class="title">
      <h1>📖 Story Path</h1>
      <p>Pilih alur cerita, baca kemungkinan, dan temukan ending terbaik.</p>
    </div>

    <div class="stats">
      <div class="stat"><h2 id="score">0</h2><span>Score</span></div>
      <div class="stat"><h2 id="level">1</h2><span>Story</span></div>
      <div class="stat"><h2 id="chapter">1</h2><span>Chapter</span></div>
      <div class="stat"><h2 id="ending">?</h2><span>Ending</span></div>
    </div>

    <div class="vision-meter">
      <div class="meter-row">
        <span>Vision Energy</span>
        <strong id="visionText">50</strong>
      </div>
      <div class="meter-bar">
        <div class="meter-fill" id="visionFill"></div>
      </div>
    </div>

    <div class="story-card">
      <div class="chapter-label" id="chapterLabel">Chapter 1</div>
      <div class="scene-title" id="sceneTitle">Gerbang Biru</div>
      <div class="scene-text" id="sceneText"></div>

      <div class="choices" id="choices"></div>

      <div class="log-box" id="logBox"></div>
    </div>

    <div class="info" id="info">
      Pilihanmu akan mengubah energi visi dan menentukan ending cerita.
    </div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="popup">
      <h2 id="popupTitle">✨ Ending Terbuka</h2>
      <p id="popupText"></p>
      <button class="restart" id="nextBtn" onclick="nextStory()">Story Berikutnya</button>
    </div>
  </div>

<script>
  const stories = [
    {
      title:"Gerbang Biru",
      intro:"Di tengah malam, kamu menemukan sebuah gerbang biru yang berdenyut seperti jantung langit. Di baliknya, ada dunia yang belum pernah dikenal.",
      chapters:[
        {
          title:"Gerbang Biru",
          text:"Gerbang itu terbuka sedikit. Kamu melihat tiga kemungkinan: jalan cahaya, jalan kabut, dan jalan sunyi.",
          choices:[
            {
              title:"Masuk lewat jalan cahaya",
              desc:"Ikuti arah yang paling jelas dan terang.",
              vision:10,
              tag:"clarity",
              log:"Kamu memilih kejelasan. Jalan menjadi terang, tapi kemungkinan lain mulai tertutup."
            },
            {
              title:"Masuk lewat jalan kabut",
              desc:"Ikuti intuisi meski belum terlihat jelas.",
              vision:20,
              tag:"intuition",
              log:"Kamu memilih kabut. Setiap langkah tidak pasti, tapi simbol-simbol baru mulai muncul."
            },
            {
              title:"Duduk dan mengamati pola gerbang",
              desc:"Baca ritme gerbang sebelum bergerak.",
              vision:15,
              tag:"pattern",
              log:"Kamu menunggu. Gerbang menunjukkan pola tersembunyi yang tidak terlihat oleh orang terburu-buru."
            }
          ]
        },
        {
          title:"Kota Mengambang",
          text:"Di balik gerbang, sebuah kota melayang di atas awan. Namun kota itu belum lengkap, seolah menunggu ide utama.",
          choices:[
            {
              title:"Bangun menara ide di pusat kota",
              desc:"Buat pusat gagasan agar kota punya arah.",
              vision:20,
              tag:"create",
              log:"Menara ide menyala. Kota mulai bergerak mengikuti visi baru."
            },
            {
              title:"Hubungkan pulau-pulau kota dengan jembatan",
              desc:"Satukan kemungkinan yang terpisah.",
              vision:18,
              tag:"connect",
              log:"Jembatan terbentuk. Banyak ide kecil mulai saling menemukan makna."
            },
            {
              title:"Turun ke pasar mimpi",
              desc:"Cari inspirasi dari simbol-simbol acak.",
              vision:8,
              tag:"explore",
              log:"Pasar mimpi ramai. Kamu mendapat banyak inspirasi, tapi arahnya masih tersebar."
            }
          ]
        },
        {
          title:"Peta Masa Depan",
          text:"Seorang penjaga memberikan peta kosong. Ia berkata, 'Peta ini hanya terisi oleh orang yang berani membayangkan akhir sebelum jalannya ada.'",
          choices:[
            {
              title:"Gambar masa depan yang besar",
              desc:"Mulai dari visi besar, baru cari jalannya.",
              vision:25,
              tag:"vision",
              log:"Peta bersinar terang. Masa depan besar membuat jalan mulai terbentuk sendiri."
            },
            {
              title:"Gambar langkah kecil satu per satu",
              desc:"Bangun masa depan dengan tahapan aman.",
              vision:10,
              tag:"step",
              log:"Peta menjadi rapi, tapi sebagian langit tetap kosong."
            },
            {
              title:"Biarkan peta menggambar dirinya sendiri",
              desc:"Percaya pada kemungkinan yang muncul spontan.",
              vision:15,
              tag:"flow",
              log:"Peta bergerak sendiri. Tidak semua jelas, tapi bentuknya unik dan hidup."
            }
          ]
        }
      ]
    },
    {
      title:"Pulau Ide Hilang",
      intro:"Sebuah pulau muncul hanya sekali setiap seratus tahun. Konon, pulau itu menyimpan satu ide yang bisa mengubah banyak kehidupan.",
      chapters:[
        {
          title:"Ombak Pertama",
          text:"Perahumu sampai di tepi pulau. Ada tiga tanda: kompas rusak, burung bercahaya, dan batu bertuliskan simbol.",
          choices:[
            {
              title:"Ikuti burung bercahaya",
              desc:"Percaya pada tanda yang hidup.",
              vision:18,
              tag:"intuition",
              log:"Burung membawamu ke jalur rahasia yang tidak ada di peta."
            },
            {
              title:"Perbaiki kompas rusak",
              desc:"Bangun arah dari alat yang ada.",
              vision:8,
              tag:"logic",
              log:"Kompas kembali berputar, tapi pulau ini tidak sepenuhnya mengikuti arah biasa."
            },
            {
              title:"Baca simbol di batu",
              desc:"Cari makna yang tersembunyi.",
              vision:20,
              tag:"symbol",
              log:"Simbol itu berubah menjadi petunjuk. Pulau seolah menjawab pikiranmu."
            }
          ]
        },
        {
          title:"Hutan Ide",
          text:"Di tengah pulau ada hutan yang pohonnya berbuah gagasan. Namun setiap gagasan harus dipilih, tidak bisa dibawa semua.",
          choices:[
            {
              title:"Ambil ide paling aneh",
              desc:"Pilih yang belum pernah terpikirkan.",
              vision:25,
              tag:"wild",
              log:"Ide aneh itu berdenyut kuat. Mungkin sulit dijelaskan, tapi penuh kemungkinan."
            },
            {
              title:"Ambil ide paling mudah dijual",
              desc:"Pilih yang paling cepat diterima.",
              vision:5,
              tag:"safe",
              log:"Ide itu praktis, namun pulau terasa kurang terkesan."
            },
            {
              title:"Gabungkan dua ide kecil",
              desc:"Buat konsep baru dari hal sederhana.",
              vision:18,
              tag:"fusion",
              log:"Dua ide kecil menyatu menjadi bentuk yang belum ada sebelumnya."
            }
          ]
        },
        {
          title:"Mercusuar Kosong",
          text:"Di puncak pulau ada mercusuar tanpa cahaya. Untuk menyalakannya, kamu harus memilih sumber inspirasi.",
          choices:[
            {
              title:"Nyalakan dengan keberanian",
              desc:"Biarkan ide besar terlihat meski belum sempurna.",
              vision:22,
              tag:"courage",
              log:"Mercusuar menyala biru. Ide itu siap dilihat dunia."
            },
            {
              title:"Nyalakan dengan keraguan",
              desc:"Uji semua kemungkinan dulu.",
              vision:8,
              tag:"doubt",
              log:"Cahaya menyala redup. Terlalu banyak ragu membuat ide kehilangan momentum."
            },
            {
              title:"Nyalakan dengan rasa penasaran",
              desc:"Biarkan pertanyaan menjadi bahan bakar.",
              vision:20,
              tag:"curiosity",
              log:"Cahaya berubah-ubah warna. Setiap pertanyaan membuka jalur baru."
            }
          ]
        }
      ]
    }
  ];

  let score = 0;
  let storyIndex = 0;
  let chapterIndex = 0;
  let vision = 50;
  let choicesTaken = [];

  const scoreEl = document.getElementById("score");
  const levelEl = document.getElementById("level");
  const chapterEl = document.getElementById("chapter");
  const endingEl = document.getElementById("ending");
  const visionText = document.getElementById("visionText");
  const visionFill = document.getElementById("visionFill");
  const chapterLabel = document.getElementById("chapterLabel");
  const sceneTitle = document.getElementById("sceneTitle");
  const sceneText = document.getElementById("sceneText");
  const choicesEl = document.getElementById("choices");
  const logBox = document.getElementById("logBox");
  const info = document.getElementById("info");
  const gameOver = document.getElementById("gameOver");
  const popupTitle = document.getElementById("popupTitle");
  const popupText = document.getElementById("popupText");
  const nextBtn = document.getElementById("nextBtn");

  function startStory(){
    chapterIndex = 0;
    vision = 50;
    choicesTaken = [];
    endingEl.innerText = "?";
    gameOver.style.display = "none";
    renderScene();
  }

  function renderScene(){
    const story = stories[storyIndex % stories.length];
    const chapter = story.chapters[chapterIndex];

    scoreEl.innerText = score;
    levelEl.innerText = storyIndex + 1;
    chapterEl.innerText = chapterIndex + 1;
    visionText.innerText = vision;
    visionFill.style.width = vision + "%";

    chapterLabel.innerText = `Chapter ${chapterIndex + 1} dari ${story.chapters.length}`;
    sceneTitle.innerText = chapter.title;
    sceneText.innerText = chapter.text;

    choicesEl.innerHTML = "";
    logBox.style.display = "none";

    chapter.choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.innerHTML = `
        <strong>${choice.title}</strong>
        ${choice.desc}
      `;
      btn.onclick = () => choosePath(choice);
      choicesEl.appendChild(btn);
    });

    info.innerText = "Pilih jalur yang paling sesuai dengan visi cerita.";
  }

  function choosePath(choice){
    vision += choice.vision;
    if(vision > 100) vision = 100;

    choicesTaken.push(choice.tag);

    logBox.style.display = "block";
    logBox.innerHTML = `<strong>Efek Pilihan:</strong><br>${choice.log}<br><br>Vision +${choice.vision}`;

    chapterIndex++;

    if(chapterIndex >= stories[storyIndex % stories.length].chapters.length){
      setTimeout(finishStory, 650);
      return;
    }

    setTimeout(renderScene, 850);
  }

  function finishStory(){
    const ending = calculateEnding();
    const earned = ending.points + vision + (storyIndex + 1) * 20;

    score += earned;
    scoreEl.innerText = score;
    endingEl.innerText = ending.code;

    popupTitle.innerText = ending.title;
    popupText.innerHTML =
      `${ending.text}<br><br>` +
      `Vision Energy: <strong>${vision}</strong><br>` +
      `Bonus ending: <strong>+${ending.points}</strong><br>` +
      `Total score: <strong>+${earned}</strong><br><br>` +
      `Score kamu:<br><br>` +
      `<span style="font-size:42px;font-weight:bold;">${score}</span>`;

    nextBtn.innerText = "Story Berikutnya";
    nextBtn.onclick = nextStory;

    gameOver.style.display = "flex";
  }

  function calculateEnding(){
    const creativeTags = ["intuition","pattern","create","connect","vision","flow","symbol","wild","fusion","courage","curiosity"];
    const safeTags = ["clarity","step","logic","safe","doubt"];

    const creativeCount = choicesTaken.filter(t => creativeTags.includes(t)).length;
    const safeCount = choicesTaken.filter(t => safeTags.includes(t)).length;

    if(vision >= 90 && creativeCount >= 2){
      return {
        code:"S+",
        title:"🌌 Visionary Ending",
        points:120,
        text:"Kamu membuka kemungkinan terbesar. Cerita berakhir sebagai visi baru yang berani dan hidup."
      };
    }

    if(vision >= 75){
      return {
        code:"A",
        title:"✨ Creative Ending",
        points:90,
        text:"Kamu menemukan ending kreatif. Tidak semua sempurna, tapi arahnya kuat dan penuh ide."
      };
    }

    if(safeCount >= 2){
      return {
        code:"B",
        title:"🌙 Safe Ending",
        points:60,
        text:"Kamu memilih jalur aman. Ending-nya stabil, tetapi sebagian kemungkinan besar belum terbuka."
      };
    }

    return {
      code:"C",
      title:"🌀 Mystery Ending",
      points:50,
      text:"Cerita berakhir misterius. Banyak simbol muncul, tapi belum cukup energi untuk membuka visi penuh."
    };
  }

  function nextStory(){
    storyIndex++;
    startStory();
  }

  startStory();
</script>
</body>
</html>

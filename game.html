<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Game Maintenance - STIFIn</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #6c5ce7;
      --secondary-color: #00d2ff;
      --bg-dark: #0f0f16;
      --glass-bg: rgba(25, 25, 35, 0.6);
      --glass-border: rgba(255, 255, 255, 0.1);
      
      /* STIFIn Colors */
      --color-sensing: #ff4757;   /* Merah */
      --color-thinking: #ced6e0;  /* Silver/Hitam */
      --color-intuiting: #1e90ff; /* Biru */
      --color-feeling: #2ed573;   /* Hijau */
      --color-instinct: #ffa502;  /* Kuning */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        linear-gradient(rgba(108, 92, 231, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108, 92, 231, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(108,92,231,0.2) 0%, rgba(0,0,0,0) 70%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 350px;
      width: 90%;
      padding: 35px 25px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 15px rgba(108, 92, 231, 0.3);
    }

    .icon-wrapper {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 20px auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .icon {
      font-size: 55px;
      z-index: 2;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.8));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(5deg); }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #fff, var(--secondary-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
    }

    p {
      font-size: 13px;
      color: #a0a0b5;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    /* --- STIFIn Dock Styles --- */
    .stifin-dock {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 25px;
      padding: 0 5px;
    }

    .stifin-badge {
      width: 45px;
      height: 45px;
      border-radius: 10px;
      background: rgba(25, 25, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    /* Efek Hover untuk masing-masing tipe STIFIn */
    .stifin-badge.sensing { color: var(--color-sensing); }
    .stifin-badge.sensing:hover {
      background: rgba(255, 71, 87, 0.15);
      border-color: var(--color-sensing);
      box-shadow: 0 0 15px rgba(255, 71, 87, 0.5);
      transform: translateY(-3px);
    }

    .stifin-badge.thinking { color: var(--color-thinking); }
    .stifin-badge.thinking:hover {
      background: rgba(206, 214, 224, 0.15);
      border-color: var(--color-thinking);
      box-shadow: 0 0 15px rgba(206, 214, 224, 0.5);
      transform: translateY(-3px);
    }

    .stifin-badge.intuiting { color: var(--color-intuiting); }
    .stifin-badge.intuiting:hover {
      background: rgba(30, 144, 255, 0.15);
      border-color: var(--color-intuiting);
      box-shadow: 0 0 15px rgba(30, 144, 255, 0.5);
      transform: translateY(-3px);
    }

    .stifin-badge.feeling { color: var(--color-feeling); }
    .stifin-badge.feeling:hover {
      background: rgba(46, 213, 115, 0.15);
      border-color: var(--color-feeling);
      box-shadow: 0 0 15px rgba(46, 213, 115, 0.5);
      transform: translateY(-3px);
    }

    .stifin-badge.instinct { color: var(--color-instinct); font-size: 14px; }
    .stifin-badge.instinct:hover {
      background: rgba(255, 165, 2, 0.15);
      border-color: var(--color-instinct);
      box-shadow: 0 0 15px rgba(255, 165, 2, 0.5);
      transform: translateY(-3px);
    }
    /* --- End of STIFIn Dock Styles --- */

    .btn {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(45deg, var(--primary-color), #8e7dff);
      color: white;
      border: none;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #d1d1e0;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }

    .footer {
      margin-top: 20px;
      font-size: 10px;
      color: #55556a;
      letter-spacing: 1px;
      font-family: 'Orbitron', sans-serif;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="icon-wrapper">
    <div class="icon">🎮</div>
  </div>

  <h1>System Update</h1>

  <p>Server sedang di-upgrade.<br>Jelajahi faksi STIFIn Anda sambil menunggu! 🚀</p>

  <div class="stifin-dock">
    <div class="stifin-badge sensing" onclick="navigateTo('https://stifinfamilymedan.com/sensing_game.html')" title="Sensing">S</div>
    <div class="stifin-badge thinking" onclick="navigateTo('https://stifinfamilymedan.com/thinking_game.html')" title="Thinking">T</div>
    <div class="stifin-badge intuiting" onclick="navigateTo('https://stifinfamilymedan.com/intuiting_game.html')" title="Intuiting">I</div>
    <div class="stifin-badge feeling" onclick="navigateTo('https://stifinfamilymedan.com/feeling_game.html')" title="Feeling">F</div>
    <div class="stifin-badge instinct" onclick="navigateTo('https://stifinfamilymedan.com/instinct_game.html')" title="Instinct">In</div>
  </div>

  <button class="btn btn-primary" onclick="retryGame()">
    <span>🔄</span> Coba Lagi
  </button>

  <button class="btn btn-secondary" onclick="goBack()">
    <span>⬅️</span> Kembali
  </button>

  <div class="footer">
    TIME App • Smart Learning Experience
  </div>
</div>

<script>
  function navigateTo(url) {
    // Tambahkan sedikit efek visual pada tombol jika mau
    console.log("Mengarahkan ke: " + url);
    window.location.href = url; 
  }

  function retryGame() {
    const btn = document.querySelector('.btn-primary');
    btn.innerHTML = '<span>⏳</span> Memuat...';
    btn.style.opacity = '0.7';
    setTimeout(() => { location.reload(); }, 500);
  }

  function goBack() {
    if (window.StifinFamilyapp) {
      window.StifinFamilyapp.postMessage("exit");
    } else if (window.flutter_inappwebview) {
      window.flutter_inappwebview.callHandler('exit');
    }
    history.back();
  }
</script>

</body>
</html>

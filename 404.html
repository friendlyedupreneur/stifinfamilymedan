<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memuat Undangan...</title>
  <style>
    /* Animasi loading elegan biar tamu tidak melihat kedipan kasar */
    body { background: #10131f; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .loader { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid #ffffff; width: 35px; height: 35px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader"></div>

  <script>
    (async () => {
      // 1. Tentukan jalur ke template utama yang Bos gunakan
      const templatePath = '/weddings/wedding_001/index.html';
      
      try {
        // 2. Ambil isi file template secara diam-diam lewat background fetch
        const response = await fetch(templatePath);
        if (!response.ok) throw new Error('Template tidak ditemukan');
        const htmlText = await response.text();
        
        // 3. Timpa dokumen 404 ini dengan isi template asli
        // Cara ini membuat URL di browser tamu TETAP `stifinfamilymedan.com/reza-intan`
        document.open();
        document.write(htmlText);
        document.close();
      } catch (error) {
        console.error(error);
        document.body.innerHTML = '<h3 style="text-align:center;">Undangan tidak dapat dimuat atau tidak ditemukan.</h3>';
      }
    })();
  </script>
</body>
</html>

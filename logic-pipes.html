<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logic Pipes</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      background:radial-gradient(circle at top,#2b2b2b,#0b0b0b 50%,#000);
      color:white;min-height:100vh;overflow-x:hidden;overflow-y:auto;
    }
    .container{max-width:480px;margin:auto;padding:20px 16px 120px}
    .back-btn{
      background:rgba(255,255,255,.1);border:none;color:white;
      padding:10px 14px;border-radius:14px;font-size:14px;margin-bottom:18px;
      cursor:pointer;
    }
    .title{text-align:center;margin-bottom:16px}
    .title h1{font-size:34px;margin-bottom:8px}
    .title p{font-size:14px;color:#d8d8d8;line-height:1.5}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
    .stat{
      background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
      border-radius:18px;padding:14px;text-align:center;
    }
    .stat h2{font-size:24px}.stat span{font-size:12px;color:#d8d8d8}

    .board{
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
      border-radius:26px;padding:16px;
    }
    .tile{
      aspect-ratio:1/1;border:none;border-radius:18px;background:#1c1c1c;
      color:white;font-size:32px;transition:.15s;position:relative;
      cursor:pointer;
    }
    .tile:active{transform:scale(.93)}
    .tile.power{background:#4CAF50;color:white;box-shadow:0 0 18px rgba(76,175,80,.8)}
    .tile.fixed{background:#2b2b2b;color:white;cursor:not-allowed}
    .tile.empty{opacity:.45;cursor:default}
    .tile.connected{background:#2196F3;box-shadow:0 0 12px rgba(33,150,243,.6)}
    .controls{margin-top:16px;display:grid;gap:12px}
    .check-btn,.reset-btn{
      border:none;border-radius:18px;padding:16px;font-size:16px;font-weight:bold;
      cursor:pointer;
    }
    .check-btn{background:white;color:black}
    .reset-btn{background:rgba(255,255,255,.12);color:white}
    .hint{text-align:center;margin-top:14px;font-size:13px;color:#d8d8d8;line-height:1.5}

    .game-over{
      position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;
      align-items:center;justify-content:center;padding:20px;z-index:99;
    }
    .popup{
      width:100%;max-width:380px;background:#111;border-radius:28px;
      padding:28px 22px;text-align:center;border:1px solid rgba(255,255,255,.12);
    }
    .popup h2{font-size:32px;margin-bottom:12px}
    .popup p{color:#d8d8d8;line-height:1.6;margin-bottom:22px}
    .restart{
      width:100%;border:none;border-radius:18px;padding:16px;
      background:white;color:black;font-size:16px;font-weight:bold;
      cursor:pointer;
    }
    
    .auto-check-hint {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: #4CAF50;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="history.back()">← Kembali</button>

    <div class="title">
      <h1>🧩 Logic Pipes</h1>
      <p>Sambungkan energi dari 🔋 Battery menuju 💡 Lampu.</p>
    </div>

    <div class="stats">
      <div class="stat"><h2 id="score">0</h2><span>Score</span></div>
      <div class="stat"><h2 id="level">1</h2><span>Level</span></div>
      <div class="stat"><h2 id="moves">0</h2><span>Moves</span></div>
    </div>

    <div class="board" id="board"></div>

    <div class="controls">
      <button class="check-btn" onclick="checkPower()">Alirkan Energi ⚡</button>
      <button class="reset-btn" onclick="loadLevel()">Acak Ulang</button>
    </div>

    <div class="hint">
      Tap kotak pipa untuk memutar. Jalur harus nyambung dari 🔋 ke 💡.
    </div>
    <div class="auto-check-hint" id="autoHint">✅ Jalur otomatis terhubung!</div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="popup">
      <h2>💡 Lampu Menyala!</h2>
      <p>Score kamu:<br><br>
        <span id="finalScore" style="font-size:42px;font-weight:bold;">0</span>
      </p>
      <button class="restart" onclick="nextLevel()">Level Berikutnya</button>
    </div>
  </div>

<script>
  const board = document.getElementById("board");
  const scoreEl = document.getElementById("score");
  const levelEl = document.getElementById("level");
  const movesEl = document.getElementById("moves");
  const gameOver = document.getElementById("gameOver");
  const finalScore = document.getElementById("finalScore");
  const autoHint = document.getElementById("autoHint");

  const SIZE = 4;
  let level = 1, score = 0, moves = 0;
  let tiles = [];

  // Level design dengan koordinat [row, col]
  const levels = [
    // Level 1: Simple straight path
    [
      {type:"battery", rot:1, row:0, col:0}, // kanan
      {type:"straight", rot:0, row:0, col:1}, // horizontal
      {type:"corner", rot:3, row:0, col:2},   // kanan-bawah
      {type:"empty", rot:0, row:0, col:3},
      {type:"empty", rot:0, row:1, col:0},
      {type:"empty", rot:0, row:1, col:1},
      {type:"straight", rot:1, row:1, col:2}, // vertikal
      {type:"empty", rot:0, row:1, col:3},
      {type:"empty", rot:0, row:2, col:0},
      {type:"empty", rot:0, row:2, col:1},
      {type:"corner", rot:0, row:2, col:2},   // kiri-bawah
      {type:"straight", rot:0, row:2, col:3}, // horizontal
      {type:"empty", rot:0, row:3, col:0},
      {type:"empty", rot:0, row:3, col:1},
      {type:"empty", rot:0, row:3, col:2},
      {type:"lamp", rot:3, row:3, col:3}      // kiri
    ],
    // Level 2: L-shape path
    [
      {type:"battery", rot:1, row:0, col:0}, // kanan
      {type:"corner", rot:1, row:0, col:1},  // kanan-bawah
      {type:"empty", rot:0, row:0, col:2},
      {type:"empty", rot:0, row:0, col:3},
      {type:"empty", rot:0, row:1, col:0},
      {type:"straight", rot:1, row:1, col:1}, // vertikal
      {type:"corner", rot:2, row:1, col:2},   // bawah-kiri
      {type:"empty", rot:0, row:1, col:3},
      {type:"empty", rot:0, row:2, col:0},
      {type:"corner", rot:0, row:2, col:1},   // kiri-bawah
      {type:"corner", rot:2, row:2, col:2},   // bawah-kiri
      {type:"empty", rot:0, row:2, col:3},
      {type:"empty", rot:0, row:3, col:0},
      {type:"straight", rot:0, row:3, col:1}, // horizontal
      {type:"straight", rot:0, row:3, col:2}, // horizontal
      {type:"lamp", rot:3, row:3, col:3}      // kiri
    ],
    // Level 3: Complex path
    [
      {type:"battery", rot:2, row:0, col:0}, // bawah
      {type:"empty", rot:0, row:0, col:1},
      {type:"corner", rot:1, row:0, col:2},  // kanan-bawah
      {type:"lamp", rot:2, row:0, col:3},    // atas
      {type:"straight", rot:1, row:1, col:0}, // vertikal
      {type:"corner", rot:1, row:1, col:1},   // kanan-bawah
      {type:"straight", rot:0, row:1, col:2}, // horizontal
      {type:"straight", rot:1, row:1, col:3}, // vertikal
      {type:"corner", rot:0, row:2, col:0},   // kiri-bawah
      {type:"corner", rot:2, row:2, col:1},   // bawah-kiri
      {type:"empty", rot:0, row:2, col:2},
      {type:"empty", rot:0, row:2, col:3},
      {type:"empty", rot:0, row:3, col:0},
      {type:"empty", rot:0, row:3, col:1},
      {type:"empty", rot:0, row:3, col:2},
      {type:"empty", rot:0, row:3, col:3}
    ]
  ];

  // Arah: 0=atas, 1=kanan, 2=bawah, 3=kiri
  function connections(tile){
    if(tile.type === "empty") return [];
    
    if(tile.type === "battery"){
      // Battery hanya mengeluarkan energi ke 1 arah
      return [tile.rot];
    }
    
    if(tile.type === "lamp"){
      // Lampu hanya menerima dari 1 arah
      return [tile.rot];
    }
    
    if(tile.type === "straight"){
      // Straight: rot 0/2 = horizontal (kiri-kanan), rot 1/3 = vertikal (atas-bawah)
      return tile.rot % 2 === 0 ? [1, 3] : [0, 2];
    }
    
    if(tile.type === "corner"){
      // Corner: rot 0=kiri-bawah, 1=kanan-bawah, 2=kanan-atas, 3=kiri-atas
      const cornerMap = [
        [3, 2], // kiri(3) dan bawah(2)
        [1, 2], // kanan(1) dan bawah(2)
        [1, 0], // kanan(1) dan atas(0)
        [3, 0]  // kiri(3) dan atas(0)
      ];
      return cornerMap[tile.rot];
    }
    
    return [];
  }

  function symbol(tile){
    if(tile.type === "battery") return "🔋";
    if(tile.type === "lamp") return "💡";
    if(tile.type === "empty") return "";
    
    if(tile.type === "straight") {
      return tile.rot % 2 === 0 ? "━" : "┃";
    }
    
    if(tile.type === "corner") {
      const cornerSymbols = ["┛", "┗", "┏", "┓"];
      return cornerSymbols[tile.rot];
    }
    
    return "?";
  }

  function loadLevel(){
    moves = 0;
    movesEl.innerText = moves;
    gameOver.style.display = "none";
    autoHint.style.display = "none";

    const levelData = levels[(level - 1) % levels.length];
    
    // Deep copy level data
    tiles = levelData.map(t => {
      const newTile = {...t};
      
      // Randomize rotation for non-fixed tiles
      if(t.type !== "battery" && t.type !== "lamp" && t.type !== "empty"){
        newTile.rot = Math.floor(Math.random() * 4);
      }
      
      newTile.power = false;
      return newTile;
    });

    render();
    checkPower(true); // Auto-check on load
  }

  function render(){
    board.innerHTML = "";

    tiles.forEach((tile, i) => {
      const btn = document.createElement("button");
      btn.className = "tile";
      if(tile.power) btn.classList.add("power");
      if(tile.type === "battery" || tile.type === "lamp") btn.classList.add("fixed");
      if(tile.type === "empty") btn.classList.add("empty");

      btn.innerText = symbol(tile);

      btn.onclick = () => {
        if(tile.type === "empty" || tile.type === "battery" || tile.type === "lamp") return;
        
        tile.rot = (tile.rot + 1) % 4;
        tile.power = false;
        moves++;
        movesEl.innerText = moves;
        render();
        checkPower(true); // Auto-check after each rotation
      };

      board.appendChild(btn);
    });
  }

  function opposite(dir){
    return (dir + 2) % 4;
  }

  function neighbor(index, dir){
    const r = Math.floor(index / SIZE);
    const c = index % SIZE;
    
    if(dir === 0 && r > 0) return index - SIZE;       // atas
    if(dir === 1 && c < SIZE - 1) return index + 1;    // kanan
    if(dir === 2 && r < SIZE - 1) return index + SIZE; // bawah
    if(dir === 3 && c > 0) return index - 1;           // kiri
    
    return -1;
  }

  function checkPower(silent = false){
    // Reset all power states
    tiles.forEach(t => t.power = false);

    const startIndex = tiles.findIndex(t => t.type === "battery");
    const endIndex = tiles.findIndex(t => t.type === "lamp");
    
    if(startIndex === -1 || endIndex === -1) return;

    // BFS untuk mencari jalur
    const queue = [startIndex];
    const visited = new Set();
    visited.add(startIndex);
    tiles[startIndex].power = true;

    while(queue.length > 0){
      const current = queue.shift();
      const currentTile = tiles[current];
      const currentConn = connections(currentTile);
      
      // Cek semua koneksi dari tile saat ini
      for(const dir of currentConn){
        const next = neighbor(current, dir);
        
        if(next === -1) continue; // Di luar board
        if(visited.has(next)) continue; // Sudah dikunjungi
        
        const nextTile = tiles[next];
        const nextConn = connections(nextTile);
        
        // Tile berikutnya harus punya koneksi ke arah sebaliknya
        const neededDir = opposite(dir);
        if(nextConn.includes(neededDir)){
          visited.add(next);
          tiles[next].power = true;
          queue.push(next);
          
          // Jika sudah sampai lampu, berhenti
          if(next === endIndex) {
            break;
          }
        }
      }
    }

    render();
    
    // Jika lampu menyala
    if(tiles[endIndex].power) {
      if(!silent) {
        score += Math.max(80 - moves * 3, 20) + level * 10;
        scoreEl.innerText = score;
        finalScore.innerText = score;
        gameOver.style.display = "flex";
      } else {
        autoHint.style.display = "block";
        setTimeout(() => {
          autoHint.style.display = "none";
        }, 2000);
      }
    }
  }

  function nextLevel(){
    level++;
    levelEl.innerText = level;
    loadLevel();
  }

  // Inisialisasi game
  loadLevel();
</script>
</body>
</html>

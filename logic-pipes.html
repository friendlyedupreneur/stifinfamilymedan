<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logic Pipes - Fixed</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      background:radial-gradient(circle at top,#2b2b2b,#0b0b0b 50%,#000);
      color:white;min-height:100vh;overflow-x:hidden;overflow-y:auto;
    }
    .container{max-width:480px;margin:auto;padding:20px 16px 120px}
    .back-btn{
      background:rgba(255,255,255,.1);border:none;color:white;
      padding:10px 14px;border-radius:14px;font-size:14px;margin-bottom:18px;
      cursor:pointer;
    }
    .title{text-align:center;margin-bottom:16px}
    .title h1{font-size:34px;margin-bottom:8px}
    .title p{font-size:14px;color:#d8d8d8;line-height:1.5}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
    .stat{
      background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
      border-radius:18px;padding:14px;text-align:center;
    }
    .stat h2{font-size:24px}.stat span{font-size:12px;color:#d8d8d8}

    .board{
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
      border-radius:26px;padding:16px;
    }
    .tile{
      aspect-ratio:1/1;border:none;border-radius:18px;background:#1c1c1c;
      color:white;font-size:32px;transition:.15s;position:relative;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .tile:active{transform:scale(.93)}
    .tile.power{background:#4CAF50;color:white;box-shadow:0 0 18px rgba(76,175,80,.8)}
    .tile.fixed{background:#2b2b2b;color:white;cursor:not-allowed}
    .tile.empty{opacity:.45;cursor:default}
    .controls{margin-top:16px;display:grid;gap:12px}
    .check-btn,.reset-btn{
      border:none;border-radius:18px;padding:16px;font-size:16px;font-weight:bold;
      cursor:pointer;
    }
    .check-btn{background:white;color:black}
    .reset-btn{background:rgba(255,255,255,.12);color:white}
    .hint{text-align:center;margin-top:14px;font-size:13px;color:#d8d8d8;line-height:1.5}

    .game-over{
      position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;
      align-items:center;justify-content:center;padding:20px;z-index:99;
    }
    .popup{
      width:100%;max-width:380px;background:#111;border-radius:28px;
      padding:28px 22px;text-align:center;border:1px solid rgba(255,255,255,.12);
    }
    .popup h2{font-size:32px;margin-bottom:12px}
    .popup p{color:#d8d8d8;line-height:1.6;margin-bottom:22px}
    .restart{
      width:100%;border:none;border-radius:18px;padding:16px;
      background:white;color:black;font-size:16px;font-weight:bold;
      cursor:pointer;
    }

    /* Visual connection indicators */
    .connection-up, .connection-right, .connection-down, .connection-left {
      position: absolute;
      background: #666;
      transition: background 0.3s;
    }
    .connection-up {
      width: 6px; height: 12px; top: -6px; left: 50%; transform: translateX(-50%);
    }
    .connection-right {
      width: 12px; height: 6px; right: -6px; top: 50%; transform: translateY(-50%);
    }
    .connection-down {
      width: 6px; height: 12px; bottom: -6px; left: 50%; transform: translateX(-50%);
    }
    .connection-left {
      width: 12px; height: 6px; left: -6px; top: 50%; transform: translateY(-50%);
    }
    .power .connection-up,
    .power .connection-right,
    .power .connection-down,
    .power .connection-left {
      background: #2E7D32;
    }
    
    .debug-info {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="history.back()">← Kembali</button>

    <div class="title">
      <h1>🧩 Logic Pipes</h1>
      <p>Sambungkan energi dari 🔋 Battery menuju 💡 Lampu.</p>
    </div>

    <div class="stats">
      <div class="stat"><h2 id="score">0</h2><span>Score</span></div>
      <div class="stat"><h2 id="level">1</h2><span>Level</span></div>
      <div class="stat"><h2 id="moves">0</h2><span>Moves</span></div>
    </div>

    <div class="board" id="board"></div>

    <div class="controls">
      <button class="check-btn" onclick="checkPower()">Alirkan Energi ⚡</button>
      <button class="reset-btn" onclick="loadLevel()">Acak Ulang</button>
    </div>

    <div class="debug-info" id="debugInfo"></div>
    <div class="hint">
      Tap kotak pipa untuk memutar. Jalur harus nyambung dari 🔋 ke 💡.
    </div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="popup">
      <h2>💡 Lampu Menyala!</h2>
      <p>Score kamu:<br><br>
        <span id="finalScore" style="font-size:42px;font-weight:bold;">0</span>
      </p>
      <button class="restart" onclick="nextLevel()">Level Berikutnya</button>
    </div>
  </div>

<script>
  const board = document.getElementById("board");
  const scoreEl = document.getElementById("score");
  const levelEl = document.getElementById("level");
  const movesEl = document.getElementById("moves");
  const gameOver = document.getElementById("gameOver");
  const finalScore = document.getElementById("finalScore");
  const debugInfo = document.getElementById("debugInfo");

  const SIZE = 4;
  let level = 1, score = 0, moves = 0;
  let tiles = [];

  // Level designs - yang sudah diperbaiki agar bisa diselesaikan
  const levels = [
    // Level 1: Path lurus sederhana
    [
      {type:"battery", rot:1},  // 0,0 - kanan (1)
      {type:"straight", rot:0}, // 0,1 - horizontal
      {type:"straight", rot:0}, // 0,2 - horizontal
      {type:"corner", rot:2},   // 0,3 - butuh dari kiri & ke bawah -> (rot 2)
      {type:"empty", rot:0},    // 1,0
      {type:"empty", rot:0},    // 1,1
      {type:"empty", rot:0},    // 1,2
      {type:"straight", rot:1}, // 1,3 - vertikal
      {type:"empty", rot:0},    // 2,0
      {type:"empty", rot:0},    // 2,1
      {type:"empty", rot:0},    // 2,2
      {type:"straight", rot:1}, // 2,3 - lurus vertikal
      {type:"empty", rot:0},    // 3,0
      {type:"empty", rot:0},    // 3,1
      {type:"empty", rot:0},    // 3,2
      {type:"lamp", rot:0},     // 3,3 - menghadap atas (0)
    ],
    // Level 2: Path L-shape
    [
      {type:"battery", rot:2},  // 0,0 - bawah (2)
      {type:"empty", rot:0},    // 0,1
      {type:"empty", rot:0},    // 0,2
      {type:"empty", rot:0},    // 0,3
      {type:"straight", rot:1}, // 1,0 - vertikal
      {type:"empty", rot:0},    // 1,1
      {type:"empty", rot:0},    // 1,2
      {type:"empty", rot:0},    // 1,3
      {type:"corner", rot:0},   // 2,0 - butuh dari atas & ke kanan -> (rot 0)
      {type:"straight", rot:0}, // 2,1 - horizontal
      {type:"straight", rot:0}, // 2,2 - horizontal
      {type:"corner", rot:2},   // 2,3 - butuh dari kiri & ke bawah -> (rot 2)
      {type:"empty", rot:0},    // 3,0
      {type:"empty", rot:0},    // 3,1
      {type:"empty", rot:0},    // 3,2
      {type:"lamp", rot:0},     // 3,3 - menghadap atas (0)
    ]
  ];

  // FUNGSI KONEKSI - Arah: 0=atas, 1=kanan, 2=bawah, 3=kiri
  function getTileConnections(tile) {
    if (!tile || tile.type === "empty") return [];
    
    switch(tile.type) {
      case "battery":
        return [tile.rot];
        
      case "lamp":
        return [tile.rot];
        
      case "straight":
        if (tile.rot === 0 || tile.rot === 2) return [1, 3]; // kanan, kiri
        return [0, 2]; // atas, bawah
        
      case "corner":
        const corners = [
          [0, 1], // rot 0: Atas & Kanan
          [1, 2], // rot 1: Kanan & Bawah
          [2, 3], // rot 2: Bawah & Kiri
          [3, 0]  // rot 3: Kiri & Atas
        ];
        return corners[tile.rot];
        
      default:
        return [];
    }
  }

  // FUNGSI SIMBOL VISUAL
  function getSymbol(tile) {
    if (!tile) return "";
    
    switch(tile.type) {
      case "battery": return "🔋";
      case "lamp": return "💡";
      case "empty": return "";
      case "straight":
        return (tile.rot === 0 || tile.rot === 2) ? "━" : "┃";
      case "corner":
        const cornerSymbols = ["┗", "┏", "┓", "┛"];
        return cornerSymbols[tile.rot];
      default: return "?";
    }
  }

  function getOppositeDir(dir) {
    return (dir + 2) % 4;
  }

  function getNeighborIndex(index, dir) {
    const row = Math.floor(index / SIZE);
    const col = index % SIZE;
    
    switch(dir) {
      case 0: return row > 0 ? index - SIZE : -1;         // atas
      case 1: return col < SIZE - 1 ? index + 1 : -1;     // kanan
      case 2: return row < SIZE - 1 ? index + SIZE : -1;  // bawah
      case 3: return col > 0 ? index - 1 : -1;            // kiri
      default: return -1;
    }
  }

  function loadLevel() {
    moves = 0;
    movesEl.innerText = moves;
    gameOver.style.display = "none";

    const levelData = levels[(level - 1) % levels.length];
    tiles = levelData.map((t, index) => ({
      ...t,
      index: index,
      power: false
    }));

    render();
    
    // Cek apakah level sudah solved dari awal
    const isSolved = checkConnections();
    if (isSolved) {
      debugInfo.textContent = "✅ Level ini sudah tersambung! Klik 'Alirkan Energi' untuk lanjut.";
    } else {
      debugInfo.textContent = "🔄 Putar pipa untuk menyambungkan jalur.";
    }
  }

  function render() {
    board.innerHTML = "";

    tiles.forEach((tile, index) => {
      const btn = document.createElement("button");
      btn.className = "tile";
      if (tile.power) btn.classList.add("power");
      if (tile.type === "battery" || tile.type === "lamp") btn.classList.add("fixed");
      if (tile.type === "empty") btn.classList.add("empty");

      // Tambahkan indikator koneksi
      const connections = getTileConnections(tile);
      
      // Container untuk symbol
      const symbolSpan = document.createElement("span");
      symbolSpan.textContent = getSymbol(tile);
      symbolSpan.style.position = "relative";
      symbolSpan.style.zIndex = "1";
      btn.appendChild(symbolSpan);

      // Tambahkan indikator visual untuk setiap koneksi
      const dirs = ["up", "right", "down", "left"];
      dirs.forEach((dirName, dirIndex) => {
        if (connections.includes(dirIndex)) {
          const indicator = document.createElement("div");
          indicator.className = `connection-${dirName}`;
          if (tile.power) {
            indicator.style.background = "#2E7D32";
          }
          btn.appendChild(indicator);
        }
      });

      btn.onclick = () => {
        if (tile.type === "empty" || tile.type === "battery" || tile.type === "lamp") return;
        
        tile.rot = (tile.rot + 1) % 4;
        moves++;
        movesEl.innerText = moves;
        render();
        
        // Cek koneksi setiap kali rotasi
        const isSolved = checkConnections();
        if (isSolved) {
          debugInfo.textContent = "✅ Jalur tersambung! Klik 'Alirkan Energi' untuk klaim score.";
        } else {
          debugInfo.textContent = "🔄 Putar pipa untuk menyambungkan jalur.";
        }
      };

      board.appendChild(btn);
    });
  }

  // FUNGSI UTAMA: Cek apakah semua pipa tersambung dengan benar
  function checkConnections() {
    // Reset power
    tiles.forEach(t => t.power = false);

    const batteryIndex = tiles.findIndex(t => t.type === "battery");
    const lampIndex = tiles.findIndex(t => t.type === "lamp");

    if (batteryIndex === -1 || lampIndex === -1) {
      debugInfo.textContent = "❌ Battery atau Lampu tidak ditemukan!";
      return false;
    }

    // BFS dari battery
    const visited = new Set();
    const queue = [batteryIndex];
    visited.add(batteryIndex);
    tiles[batteryIndex].power = true;

    let foundPath = false;

    while (queue.length > 0) {
      const currentIndex = queue.shift();
      const currentTile = tiles[currentIndex];
      const currentConnections = getTileConnections(currentTile);

      // Cek setiap arah koneksi dari tile saat ini
      for (const dir of currentConnections) {
        const neighborIndex = getNeighborIndex(currentIndex, dir);
        
        // Skip jika di luar board
        if (neighborIndex === -1) continue;
        
        // Skip jika sudah dikunjungi
        if (visited.has(neighborIndex)) continue;
        
        const neighborTile = tiles[neighborIndex];
        
        // Skip jika tile kosong
        if (neighborTile.type === "empty") continue;
        
        const neighborConnections = getTileConnections(neighborTile);
        const neededDir = getOppositeDir(dir);
        
        // Cek apakah neighbor punya koneksi ke arah sebaliknya
        if (neighborConnections.includes(neededDir)) {
          visited.add(neighborIndex);
          tiles[neighborIndex].power = true;
          queue.push(neighborIndex);
          
          // Jika sampai di lampu, tandai found
          if (neighborIndex === lampIndex) {
            foundPath = true;
          }
        }
      }
    }

    // Render ulang untuk menunjukkan power
    render();
    
    return foundPath && tiles[lampIndex].power;
  }

  function checkPower() {
    const isConnected = checkConnections();
    
    if (isConnected && tiles[tiles.findIndex(t => t.type === "lamp")].power) {
      // Hitung score
      const baseScore = 100;
      const movePenalty = moves * 2;
      const levelBonus = level * 20;
      const earnedScore = Math.max(baseScore - movePenalty + levelBonus, 10);
      
      score += earnedScore;
      scoreEl.innerText = score;
      finalScore.innerText = score;
      
      debugInfo.textContent = `✅ Berhasil! +${earnedScore} poin`;
      gameOver.style.display = "flex";
    } else {
      // Tunjukkan debug info kenapa gagal
      const batteryIndex = tiles.findIndex(t => t.type === "battery");
      const lampIndex = tiles.findIndex(t => t.type === "lamp");
      const poweredCount = tiles.filter(t => t.power).length;
      
      debugInfo.textContent = `❌ Belum tersambung. ${poweredCount} tile menyala. Coba putar lagi!`;
      
      // Vibrasi atau feedback visual
      const checkBtn = document.querySelector(".check-btn");
      checkBtn.style.transform = "scale(0.95)";
      setTimeout(() => {
        checkBtn.style.transform = "scale(1)";
      }, 100);
    }
  }

  function nextLevel() {
    level++;
    levelEl.innerText = level;
    gameOver.style.display = "none";
    loadLevel();
  }

  // Start game
  loadLevel();
</script>
</body>
</html>

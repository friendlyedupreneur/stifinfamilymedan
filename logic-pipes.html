<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logic Pipes - Fixed</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      background:radial-gradient(circle at top,#2b2b2b,#0b0b0b 50%,#000);
      color:white;min-height:100vh;overflow-x:hidden;overflow-y:auto;
    }
    .container{max-width:480px;margin:auto;padding:20px 16px 120px}
    .back-btn{
      background:rgba(255,255,255,.1);border:none;color:white;
      padding:10px 14px;border-radius:14px;font-size:14px;margin-bottom:18px;
      cursor:pointer;
    }
    .title{text-align:center;margin-bottom:16px}
    .title h1{font-size:34px;margin-bottom:8px}
    .title p{font-size:14px;color:#d8d8d8;line-height:1.5}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
    .stat{
      background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
      border-radius:18px;padding:14px;text-align:center;
    }
    .stat h2{font-size:24px}.stat span{font-size:12px;color:#d8d8d8}

    .board{
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
      border-radius:26px;padding:16px;
    }
    .tile{
      aspect-ratio:1/1;border:none;border-radius:18px;background:#1c1c1c;
      color:white;font-size:32px;transition:.15s;position:relative;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
    }
    .tile:active{transform:scale(.93)}
    .tile.power{background:#4CAF50;color:white;box-shadow:0 0 18px rgba(76,175,80,.8)}
    .tile.fixed{background:#2b2b2b;color:white;cursor:not-allowed}
    .tile.empty{opacity:.45;cursor:default}
    .controls{margin-top:16px;display:grid;gap:12px}
    .check-btn,.reset-btn{
      border:none;border-radius:18px;padding:16px;font-size:16px;font-weight:bold;
      cursor:pointer;
    }
    .check-btn{background:white;color:black}
    .reset-btn{background:rgba(255,255,255,.12);color:white}
    .hint{text-align:center;margin-top:14px;font-size:13px;color:#d8d8d8;line-height:1.5}

    .game-over{
      position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;
      align-items:center;justify-content:center;padding:20px;z-index:99;
    }
    .popup{
      width:100%;max-width:380px;background:#111;border-radius:28px;
      padding:28px 22px;text-align:center;border:1px solid rgba(255,255,255,.12);
    }
    .popup h2{font-size:32px;margin-bottom:12px}
    .popup p{color:#d8d8d8;line-height:1.6;margin-bottom:22px}
    .restart{
      width:100%;border:none;border-radius:18px;padding:16px;
      background:white;color:black;font-size:16px;font-weight:bold;
      cursor:pointer;
    }

    /* Visual connection indicators */
    .connection-up, .connection-right, .connection-down, .connection-left {
      position: absolute;
      background: #666;
      transition: background 0.3s;
    }
    .connection-up {
      width: 6px; height: 12px; top: -6px; left: 50%; transform: translateX(-50%);
    }
    .connection-right {
      width: 12px; height: 6px; right: -6px; top: 50%; transform: translateY(-50%);
    }
    .connection-down {
      width: 6px; height: 12px; bottom: -6px; left: 50%; transform: translateX(-50%);
    }
    .connection-left {
      width: 12px; height: 6px; left: -6px; top: 50%; transform: translateY(-50%);
    }
    .power .connection-up,
    .power .connection-right,
    .power .connection-down,
    .power .connection-left {
      background: #2E7D32;
    }
    
    .debug-info {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
      min-height: 20px;
    }

    .board.energy-running {
  box-shadow:
    0 0 18px rgba(76,175,80,.35),
    inset 0 0 28px rgba(76,175,80,.18);
  animation: boardEnergyPulse .8s ease;
}

.tile.energy-flash {
  animation: tileEnergyFlash .55s ease forwards;
}

.tile.lamp-on {
  background: #7CFF6B !important;
  color: #000 !important;
  box-shadow:
    0 0 18px rgba(124,255,107,.95),
    0 0 34px rgba(124,255,107,.55) !important;
  animation: lampGlow 1s ease-in-out infinite alternate;
}

.check-btn.loading {
  background: #7CFF6B;
  color: #000;
  box-shadow: 0 0 22px rgba(124,255,107,.65);
}

.board.energy-fail {
  animation: failShake .25s ease;
}

@keyframes boardEnergyPulse {
  0% { transform: scale(1); }
  45% { transform: scale(1.015); }
  100% { transform: scale(1); }
}

@keyframes tileEnergyFlash {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 rgba(124,255,107,0);
  }
  50% {
    transform: scale(1.08);
    box-shadow: 0 0 22px rgba(124,255,107,.85);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 16px rgba(124,255,107,.55);
  }
}

@keyframes lampGlow {
  from {
    box-shadow:
      0 0 16px rgba(124,255,107,.75),
      0 0 28px rgba(124,255,107,.35);
  }
  to {
    box-shadow:
      0 0 28px rgba(124,255,107,1),
      0 0 48px rgba(124,255,107,.65);
  }
}

@keyframes failShake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-3px); }
  100% { transform: translateX(0); }
}
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="history.back()">← Kembali</button>

    <div class="title">
      <h1>🧩 Logic Pipes</h1>
      <p>Sambungkan energi dari 🔋 Battery menuju 💡 Lampu.</p>
    </div>

    <div class="stats">
      <div class="stat"><h2 id="score">0</h2><span>Score</span></div>
      <div class="stat"><h2 id="level">1</h2><span>Level</span></div>
      <div class="stat"><h2 id="moves">0</h2><span>Moves</span></div>
    </div>

    <div class="board" id="board"></div>

    <div class="controls">
      <button class="check-btn" onclick="checkPower()">Alirkan Energi ⚡</button>
      <button class="reset-btn" onclick="loadLevel()">Acak Ulang</button>
    </div>

    <div class="debug-info" id="debugInfo"></div>
    <div class="hint">
      Tap kotak pipa untuk memutar. Jalur harus nyambung dari 🔋 ke 💡.
    </div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="popup">
      <h2>💡 Lampu Menyala!</h2>
      <p>Score kamu:<br><br>
        <span id="finalScore" style="font-size:42px;font-weight:bold;">0</span>
      </p>
      <button class="restart" onclick="nextLevel()">Level Berikutnya</button>
    </div>
  </div>

<script>
  const board = document.getElementById("board");
  const scoreEl = document.getElementById("score");
  const levelEl = document.getElementById("level");
  const movesEl = document.getElementById("moves");
  const gameOver = document.getElementById("gameOver");
  const finalScore = document.getElementById("finalScore");
  const debugInfo = document.getElementById("debugInfo") || { textContent: "" };

  const SIZE = 4;
  let level = 1;
  let score = 0;
  let moves = 0;
  let tiles = [];

  // Arah: 0=atas, 1=kanan, 2=bawah, 3=kiri
  const PIPE_STATES = [
    { symbol: "━", conn: [1, 3] }, // horizontal
    { symbol: "┃", conn: [0, 2] }, // vertikal
    { symbol: "┗", conn: [0, 1] }, // atas + kanan
    { symbol: "┏", conn: [1, 2] }, // kanan + bawah
    { symbol: "┓", conn: [2, 3] }, // bawah + kiri
    { symbol: "┛", conn: [3, 0] }  // kiri + atas
  ];

  const levels = [
    [
      { type:"battery", dir:1 },
      { type:"pipe", solution:0 },
      { type:"pipe", solution:4 },
      { type:"empty" },

      { type:"empty" },
      { type:"empty" },
      { type:"pipe", solution:1 },
      { type:"empty" },

      { type:"empty" },
      { type:"empty" },
      { type:"pipe", solution:2 },
      { type:"pipe", solution:4 },

      { type:"empty" },
      { type:"empty" },
      { type:"empty" },
      { type:"lamp", dir:0 }
    ],

    [
      { type:"battery", dir:2 },
      { type:"empty" },
      { type:"empty" },
      { type:"empty" },

      { type:"pipe", solution:1 },
      { type:"empty" },
      { type:"empty" },
      { type:"empty" },

      { type:"pipe", solution:2 },
      { type:"pipe", solution:0 },
      { type:"pipe", solution:0 },
      { type:"pipe", solution:4 },

      { type:"empty" },
      { type:"empty" },
      { type:"empty" },
      { type:"lamp", dir:0 }
    ],

    [
      { type:"battery", dir:1 },
      { type:"pipe", solution:0 },
      { type:"pipe", solution:4 },
      { type:"empty" },

      { type:"empty" },
      { type:"empty" },
      { type:"pipe", solution:1 },
      { type:"empty" },

      { type:"empty" },
      { type:"pipe", solution:3 },
      { type:"pipe", solution:5 },
      { type:"empty" },

      { type:"empty" },
      { type:"pipe", solution:2 },
      { type:"pipe", solution:0 },
      { type:"lamp", dir:3 }
    ]
  ];

  function randomPipeState(exceptState) {
    let state;
    do {
      state = Math.floor(Math.random() * PIPE_STATES.length);
    } while (state === exceptState);

    return state;
  }

  function getConnections(tile) {
    if (!tile || tile.type === "empty") return [];

    if (tile.type === "battery") return [tile.dir];
    if (tile.type === "lamp") return [tile.dir];

    if (tile.type === "pipe") {
      return PIPE_STATES[tile.state].conn;
    }

    return [];
  }

  function getSymbol(tile) {
    if (!tile) return "";

    if (tile.type === "battery") return "🔋";
    if (tile.type === "lamp") return "💡";
    if (tile.type === "empty") return "";

    if (tile.type === "pipe") {
      return PIPE_STATES[tile.state].symbol;
    }

    return "?";
  }

  function opposite(dir) {
    return (dir + 2) % 4;
  }

  function neighbor(index, dir) {
    const row = Math.floor(index / SIZE);
    const col = index % SIZE;

    if (dir === 0 && row > 0) return index - SIZE;
    if (dir === 1 && col < SIZE - 1) return index + 1;
    if (dir === 2 && row < SIZE - 1) return index + SIZE;
    if (dir === 3 && col > 0) return index - 1;

    return -1;
  }

  function loadLevel() {
    moves = 0;
    movesEl.innerText = moves;
    gameOver.style.display = "none";

    const data = levels[(level - 1) % levels.length];

    tiles = data.map(tile => {
      const copy = { ...tile, power:false };

      if (copy.type === "pipe") {
        copy.state = randomPipeState(copy.solution);
      }

      return copy;
    });

    debugInfo.textContent = "🔄 Putar pipa sampai jalur 🔋 terhubung ke 💡.";
    render();
  }

  function render() {
    board.innerHTML = "";

    tiles.forEach((tile, index) => {
      const btn = document.createElement("button");
      btn.className = "tile";

      if (tile.power) btn.classList.add("power");
      if (tile.type === "battery" || tile.type === "lamp") btn.classList.add("fixed");
      if (tile.type === "empty") btn.classList.add("empty");

      const symbolSpan = document.createElement("span");
      symbolSpan.textContent = getSymbol(tile);
      symbolSpan.style.position = "relative";
      symbolSpan.style.zIndex = "2";
      btn.appendChild(symbolSpan);

      const dirs = ["up", "right", "down", "left"];
      const connections = getConnections(tile);

      dirs.forEach((dirName, dirIndex) => {
        if (connections.includes(dirIndex)) {
          const indicator = document.createElement("div");
          indicator.className = `connection-${dirName}`;
          btn.appendChild(indicator);
        }
      });

      btn.onclick = () => {
        if (tile.type !== "pipe") return;

        tile.state = (tile.state + 1) % PIPE_STATES.length;
        tile.power = false;

        moves++;
        movesEl.innerText = moves;

        tiles.forEach(t => t.power = false);
        debugInfo.textContent = "⚙️ Pipa berubah bentuk. Coba alirkan energi.";
        render();
      };

      board.appendChild(btn);
    });
  }

  function tracePower() {
    tiles.forEach(t => t.power = false);

    const batteryIndex = tiles.findIndex(t => t.type === "battery");
    const lampIndex = tiles.findIndex(t => t.type === "lamp");

    const queue = [batteryIndex];
    const visited = new Set([batteryIndex]);

    tiles[batteryIndex].power = true;

    while (queue.length > 0) {
      const current = queue.shift();
      const currentConnections = getConnections(tiles[current]);

      currentConnections.forEach(dir => {
        const next = neighbor(current, dir);

        if (next === -1) return;
        if (visited.has(next)) return;
        if (tiles[next].type === "empty") return;

        const nextConnections = getConnections(tiles[next]);

        if (nextConnections.includes(opposite(dir))) {
          visited.add(next);
          tiles[next].power = true;
          queue.push(next);
        }
      });
    }

    render();

    return tiles[lampIndex].power;
  }

  let checkingEnergy = false;

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function playEnergyAnimation(success) {
  const checkBtn = document.querySelector(".check-btn");
  const tileButtons = document.querySelectorAll(".tile");

  const poweredIndexes = tiles
    .map((tile, index) => tile.power ? index : null)
    .filter(index => index !== null);

  board.classList.add("energy-running");
  checkBtn.classList.add("loading");

  for (const index of poweredIndexes) {
    const tileEl = tileButtons[index];

    if (tileEl) {
      tileEl.classList.add("energy-flash");

      if (success && tiles[index].type === "lamp") {
        tileEl.classList.add("lamp-on");
      }
    }

    await sleep(120);
  }

  if (!success) {
    board.classList.add("energy-fail");

    await sleep(300);

    board.classList.remove("energy-fail");
  }

  await sleep(450);

  checkBtn.classList.remove("loading");
  board.classList.remove("energy-running");
}

  async function checkPower() {
  if (checkingEnergy) return;

  checkingEnergy = true;

  const connected = tracePower();

  await playEnergyAnimation(connected);

  if (connected) {
    const earnedScore = Math.max(120 - moves * 3, 25) + level * 15;

    score += earnedScore;
    scoreEl.innerText = score;
    finalScore.innerText = score;

    debugInfo.textContent = `✅ Jalur aktif! +${earnedScore} poin`;

    setTimeout(() => {
      gameOver.style.display = "flex";
      checkingEnergy = false;
    }, 400);

  } else {
    const poweredCount = tiles.filter(t => t.power).length;

    debugInfo.textContent =
      `❌ Energi belum sampai ke lampu. ${poweredCount} tile sudah menyala.`;

    checkingEnergy = false;
  }
}
  function nextLevel() {
    level++;
    levelEl.innerText = level;
    gameOver.style.display = "none";
    loadLevel();
  }

  loadLevel();
</script>
</body>
</html>

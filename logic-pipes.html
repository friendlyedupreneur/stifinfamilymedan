<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logic Pipes</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:
        radial-gradient(circle at top,#2b2b2b,#0b0b0b 50%,#000);
      color:white;
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
    }

    .container{
      max-width:480px;
      margin:auto;
      padding:20px 16px 120px;
    }

    .back-btn{
      background:rgba(255,255,255,.1);
      border:none;
      color:white;
      padding:10px 14px;
      border-radius:14px;
      font-size:14px;
      margin-bottom:18px;
    }

    .title{
      text-align:center;
      margin-bottom:16px;
    }

    .title h1{
      font-size:34px;
      margin-bottom:8px;
    }

    .title p{
      font-size:14px;
      color:#d8d8d8;
      line-height:1.5;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-bottom:16px;
    }

    .stat{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:14px;
      text-align:center;
    }

    .stat h2{
      font-size:24px;
    }

    .stat span{
      font-size:12px;
      color:#d8d8d8;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:26px;
      padding:16px;
    }

    .pipe{
      aspect-ratio:1/1;
      border:none;
      border-radius:18px;
      background:#1c1c1c;
      color:white;
      font-size:34px;
      transition:.15s;
    }

    .pipe:active{
      transform:scale(.93);
    }

    .pipe.active{
      background:white;
      color:black;
    }

    .controls{
      margin-top:16px;
      display:grid;
      gap:12px;
    }

    .check-btn{
      border:none;
      border-radius:18px;
      padding:16px;
      background:white;
      color:black;
      font-size:16px;
      font-weight:bold;
    }

    .reset-btn{
      border:none;
      border-radius:18px;
      padding:16px;
      background:rgba(255,255,255,.12);
      color:white;
      font-size:15px;
      font-weight:bold;
    }

    .hint{
      margin-top:14px;
      text-align:center;
      font-size:13px;
      color:#d8d8d8;
      line-height:1.5;
    }

    .game-over{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.82);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:99;
    }

    .popup{
      width:100%;
      max-width:380px;
      background:#111;
      border-radius:28px;
      padding:28px 22px;
      text-align:center;
      border:1px solid rgba(255,255,255,.12);
    }

    .popup h2{
      font-size:32px;
      margin-bottom:12px;
    }

    .popup p{
      color:#d8d8d8;
      line-height:1.6;
      margin-bottom:22px;
    }

    .restart{
      width:100%;
      border:none;
      border-radius:18px;
      padding:16px;
      background:white;
      color:black;
      font-size:16px;
      font-weight:bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <button class="back-btn" onclick="history.back()">
      ← Kembali
    </button>

    <div class="title">
      <h1>🧩 Logic Pipes</h1>

      <p>
        Putar pipa hingga seluruh jalur energi terhubung.
      </p>
    </div>

    <div class="stats">

      <div class="stat">
        <h2 id="score">0</h2>
        <span>Score</span>
      </div>

      <div class="stat">
        <h2 id="level">1</h2>
        <span>Level</span>
      </div>

      <div class="stat">
        <h2 id="moves">0</h2>
        <span>Moves</span>
      </div>

    </div>

    <div class="board" id="board"></div>

    <div class="controls">

      <button class="check-btn" onclick="checkSolution()">
        Periksa Jalur
      </button>

      <button class="reset-btn" onclick="generateBoard()">
        Acak Ulang
      </button>

    </div>

    <div class="hint">
      Tap pipa untuk memutarnya hingga semua jalur aktif ⚡
    </div>

  </div>

  <div class="game-over" id="gameOver">

    <div class="popup">

      <h2>⚡ Jalur Aktif!</h2>

      <p>
        Score kamu:
        <br><br>

        <span
          id="finalScore"
          style="font-size:42px;font-weight:bold;"
        >
          0
        </span>

      </p>

      <button class="restart" onclick="nextLevel()">
        Level Berikutnya
      </button>

    </div>

  </div>

  <script>

    const boardEl = document.getElementById("board");

    const scoreEl = document.getElementById("score");
    const levelEl = document.getElementById("level");
    const movesEl = document.getElementById("moves");

    const gameOver = document.getElementById("gameOver");
    const finalScore = document.getElementById("finalScore");

    let score = 0;
    let level = 1;
    let moves = 0;

    let pipes = [];

    const pipeTypes = [
      "┃",
      "━",
      "┏",
      "┓",
      "┗",
      "┛"
    ];

    function randomPipe(){
      return pipeTypes[
        Math.floor(Math.random() * pipeTypes.length)
      ];
    }

    function generateBoard(){

      pipes = [];
      boardEl.innerHTML = "";

      moves = 0;
      movesEl.innerText = moves;

      for(let i=0;i<16;i++){

        const pipe = {
          type: randomPipe(),
          active:false
        };

        pipes.push(pipe);

        const btn =
          document.createElement("button");

        btn.className = "pipe";

        btn.innerText = pipe.type;

        btn.onclick = () => rotatePipe(i);

        boardEl.appendChild(btn);

      }

      renderBoard();

    }

    function rotatePipe(index){

      const current = pipes[index];

      const currentIndex =
        pipeTypes.indexOf(current.type);

      const nextIndex =
        (currentIndex + 1) % pipeTypes.length;

      current.type = pipeTypes[nextIndex];

      moves++;

      movesEl.innerText = moves;

      renderBoard();

    }

    function renderBoard(){

      const buttons =
        document.querySelectorAll(".pipe");

      buttons.forEach((btn,index)=>{

        btn.innerText = pipes[index].type;

        if(pipes[index].active){
          btn.classList.add("active");
        }else{
          btn.classList.remove("active");
        }

      });

    }

    function checkSolution(){

      let correct = 0;

      pipes.forEach(pipe => {

        const success =
          Math.random() > 0.35;

        pipe.active = success;

        if(success){
          correct++;
        }

      });

      renderBoard();

      if(correct >= 14){

        const bonus =
          Math.max(50 - moves,10);

        score += bonus + (level * 5);

        scoreEl.innerText = score;

        finalScore.innerText = score;

        gameOver.style.display = "flex";

      }

    }

    function nextLevel(){

      level++;

      levelEl.innerText = level;

      gameOver.style.display = "none";

      generateBoard();

    }

    generateBoard();

  </script>

</body>
</html>
